const isPass=(v,k)=>{if(v===null||v===undefined||v==="")return null;if(k.dir==="bool")return["yes","Yes","1",1,true].includes(v);const n=parseFloat(v);if(isNaN(n))return null;return k.dir==="lt"?n<k.thresh:n>k.thresh;};

const mg=(a,b)=>{const r={...a};Object.entries(b).forEach(([k,v])=>{if(v!==undefined&&v!==null&&v!=="")r[k]=v;});return r;};

const parseCSV=(text)=>{const lines=text.trim().split(/\r?\n/).map(l=>l.trim()).filter(Boolean);if(lines.length<2)return[];const hdrs=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,"").toLowerCase().replace(/\s+/g,"_"));return lines.slice(1).map(line=>{const vals=[];let cur="";let inQ=false;for(const c of line){if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){vals.push(cur.trim());cur="";}else cur+=c;}vals.push(cur.trim());const o={};hdrs.forEach((h,i)=>{o[h]=vals[i]||"";});return o;});};

    // Support both old anon key (eyJ...) and new publishable key (sb_publishable_...) formats

      ...(body?{body:JSON.stringify(body)}:{})

  const dateToWk=(ds)=>{
    try{
      const parts=ds.split("/");
      const d=new Date(+parts[2],+parts[0]-1,+parts[1]);
      for(const[w,s,e] of FY25_WK_RANGES){
        const sd=new Date(s),ed=new Date(e);
        if(d>=sd&&d<=ed)return w;
      }
    }catch{}return null;
  };
  const dateToMonthLabel=(ds)=>{
    try{const p=ds.split("/");const d=new Date(+p[2],+p[0]-1,+p[1]);return d.toLocaleString("en-NZ",{month:"long",year:"numeric"});}catch{return null;}
  };
  const parseNetHours=(startT,endT,breakMin)=>{
    try{
      const[sh,sm]=startT.split(":").map(Number);
      const[eh,em]=endT.split(":").map(Number);
      const gross=(eh*60+em)-(sh*60+sm);
      return Math.max(0,Math.round((gross-(breakMin||0))*100/60)/100);
    }catch{return 0;}
  };
  const handleSchedFile=(e)=>{
    const file=e.target.files[0];if(!file)return;
    if(!window.XLSX){toast2("Loading Excel reader, please try again in a moment.");return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=window.XLSX.read(ev.target.result,{type:"array"});
        const ws=wb.Sheets["Shifts"];
        if(!ws){toast2("No Shifts sheet found in file.");return;}
        const rows=window.XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        if(rows.length<2){toast2("No data rows found.");return;}
        // headers: Member,Work Email,Group,Start Date,Start Time,End Date,End Time,Theme Color,Custom Label,Unpaid Break (minutes),Notes,Shared
        const newSched={};
        let imported=0;
        for(let i=1;i<rows.length;i++){
          const row=rows[i];
          const name=String(row[0]||"").trim();
          const group=String(row[2]||"").trim();
          const startDate=String(row[3]||"").trim();
          const startTime=String(row[4]||"").trim();
          const endTime=String(row[6]||"").trim();
          const breakMin=Number(row[9])||0;
          const label=String(row[8]||"").trim();
          const notes=String(row[10]||"").trim();
          if(!name||!startDate||!startTime||!endTime)continue;
          const net=parseNetHours(startTime,endTime,breakMin);
          const wk=dateToWk(startDate);
          const mon=dateToMonthLabel(startDate);
          if(!newSched[name])newSched[name]={group,weeks:{},months:{},days:{},overrides:{}};
          if(!newSched[name].days[startDate])newSched[name].days[startDate]={hours:0,shifts:[]};
          newSched[name].days[startDate].hours=Math.round((newSched[name].days[startDate].hours+net)*100)/100;
          newSched[name].days[startDate].shifts.push({s:startTime,e:endTime,b:breakMin,net,label,notes});
          if(wk){
            if(!newSched[name].weeks[wk])newSched[name].weeks[wk]=0;
            newSched[name].weeks[wk]=Math.round((newSched[name].weeks[wk]+net)*100)/100;

              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{background:"#f8fafc"}}>

                      <th key={h} style={{padding:"8px 12px",textAlign:h==="Agent"||h==="Team"?"left":"center",fontWeight:600,color:"#374151",borderBottom:"1px solid #e5e7eb",fontSize:11,whiteSpace:"nowrap"}}>{h}</th>

                  </tr>
                </thead>
                <tbody>
                  {Object.entries(byTeam).sort().map(([tname,people])=>{
                    const tColor=Object.entries(tc).find(([n])=>n===tname)?.[1]?.color||"#64748b";
                    const tBg=Object.entries(tc).find(([n])=>n===tname)?.[1]?.lightBg||"#f8fafc";
                    // team totals
                    const teamStats=people.map(n=>getIcStats(n,icFilter,icWeek,icMonth)).filter(Boolean);
                    const teamClosed=teamStats.reduce((s,x)=>s+(x.closed||0),0);
                    return[
                      <tr key={`g_${tname}`} style={{background:tBg}}>
                        <td colSpan={7} style={{padding:"6px 12px",fontSize:11,fontWeight:700,color:tColor,letterSpacing:".4px",textTransform:"uppercase"}}>{tname} — {teamClosed} total tickets this period</td>

                      ...people.sort().map((name,i)=>{
                        const stats=getIcStats(name,icFilter,icWeek,icMonth);
                        const hrs=getSchedHours(name,icFilter,icWeek,icMonth);
                        // all 1pt each
                        const prodScore=stats&&hrs?(Math.round(((stats.closed||0)+(stats.emails||0)+(stats.wfs||0)+(stats.calls||0))/hrs*10)/10):null;
                        return(
                          <tr key={name} style={{background:i%2?"#fafafa":"#fff",borderBottom:"1px solid #f1f5f9"}}>

                            <td style={{padding:"9px 12px",textAlign:"center"}}>
                              {stats?.wfs?<span style={{fontWeight:600,color:"#7c3aab"}}>{stats.wfs}<span style={{fontSize:10,color:"#94a3b8",fontWeight:400}}> pts</span></span>:"—"}
                            </td>
                            <td style={{padding:"9px 12px",textAlign:"center",color:stats?.calls?"#1e293b":"#cbd5e1"}}>{stats?.calls??"—"}</td>
                            <td style={{padding:"9px 12px",textAlign:"center"}}>
                              {stats?.medFirstReply!=null?(
                                <span style={{fontSize:12,color:stats.medFirstReply<4?"#15803d":"#dc2626",fontWeight:500}}>{stats.medFirstReply}h</span>
                              ):"—"}
                            </td>
                            <td style={{padding:"9px 12px",textAlign:"center"}}>
                              {stats?.medClose!=null?(
                                <span style={{fontSize:12,color:stats.medClose<8?"#15803d":"#dc2626",fontWeight:500}}>{stats.medClose}h</span>
                              ):"—"}
                            </td>
                            <td style={{padding:"9px 12px",textAlign:"center",color:hrs?"#1e293b":"#94a3b8",fontSize:12}}>
                              {hrs!=null?`${hrs}h`:<span style={{fontSize:11,color:"#cbd5e1"}}>Upload schedule</span>}
                            </td>
                            <td style={{padding:"9px 12px",textAlign:"center"}}>
                              {prodScore!=null?(
                                <span style={{fontWeight:700,fontSize:13,color:"#1e3a5f",background:"#e8f1fb",padding:"3px 9px",borderRadius:6,display:"inline-block"}}>{prodScore}/hr</span>
                              ):hrs==null?(
                                <span style={{fontSize:11,color:"#cbd5e1"}}>Need hours</span>
                              ):(
                                <span style={{fontSize:11,color:"#94a3b8"}}>No tickets</span>
                              )}
                            </td>
                          </tr>
                        );
                      })
                    ];
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* Auto-fill info */}
        <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:11,padding:"12px 16px",marginBottom:14}}>
          <div style={{fontWeight:600,fontSize:12,color:"#92400e",marginBottom:6}}>What uploads auto-fill into the Dashboard</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:8,fontSize:12,color:"#78350f"}}>
            <div><strong>Closed conversations CSV</strong> ✅ Source of truth for tickets<br/>→ Productivity – Team (pts/hr)<br/>→ Productivity – Team Lead (pts/hr)<br/><span style={{color:"#94a3b8",fontSize:11}}>(requires schedule hours to be uploaded too)</span></div>
            <div><strong>Conversation export CSV</strong><br/>→ Avg First Response Time (hrs)<br/>→ Avg Response Time (hrs)<br/><span style={{color:"#dc2626",fontSize:11}}>⚠ Capped at 100 rows — do NOT use for ticket counts</span></div>
            <div><strong>Replies by agent CSV</strong><br/>→ Stored per agent for individual view</div>
            <div><strong>Work Completed CSV</strong> ✅ Case Actions report<br/>→ Emails (Cases + Template combined)<br/>→ Case Actions shown as visual only (no productivity impact)<br/>→ WFs = 1 pt each → added to productivity</div>
            <div><strong>Total Calls CSV</strong> ✅ Calls per person<br/>→ Calls per agent shown in Reports<br/>→ 1 pt each → added to productivity</div>
            <div><strong>Answer Rate CSV</strong> ✅ Guest or Owner<br/>→ Auto-fills Call Answer Rate KPI on Dashboard<br/>→ Name file with 'Guest' or 'Owner' to detect team</div>
          </div>
        </div>

        {/* Legend */}
        {Object.keys(icData).length>0&&<div style={{display:"flex",gap:14,flexWrap:"wrap",fontSize:12,color:"#64748b"}}>
          <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:2,background:"#dcfce7",border:"1px solid #86efac",display:"inline-block"}}/> First reply under 4h</span>
          <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:2,background:"#fee2e2",border:"1px solid #fca5a5",display:"inline-block"}}/> Over target</span>
          <span style={{marginLeft:"auto",color:"#94a3b8"}}>Response times are medians for that period. Productivity requires schedule hours to be loaded.</span>
        </div>}
      </div>
    );
  }

  function IndivPanel(){
    if(!iMember)return null;
    const{id,name,teamName}=iMember;
    const ik=iPK(iPt,iMo,iWk);const d=getID(id,iPt,iMo,iWk);
    const ap=avgProd(teamName,iPt,iMo,iWk);
    const td2=tc[teamName]||{};const pu=td2?.kpis?.find(k=>k.key==="productivity_team")?.unit||"/hr";
    const passK=(d._kpis||[]).filter(k=>isPass(d[k.key],k)===true);
    const failK=(d._kpis||[]).filter(k=>isPass(d[k.key],k)===false);
    const lb=plbl(ik);const pv=+d.productivity;const av=+ap;const bars=!isNaN(pv)&&pv>0&&!isNaN(av)&&av>0;const bMax=bars?Math.max(pv,av)*1.3:1;
    const iEmailTxt=()=>{
      const sk=d._kpis||[];const ps=sk.filter(k=>isPass(d[k.key],k)===true);const fl=sk.filter(k=>isPass(d[k.key],k)===false);
      const icStats=getIcStats(name,iPt,iWk,iMo);
      const hrs=getSchedHours(name,iPt,iWk,iMo);
      // all 1pt each - no ppt needed
      const wfPts=icStats?.wfs||0;
      const emailPts=icStats?.emails||0;
      const callPts=icStats?.calls||0;
      const autoScore=icStats&&hrs?Math.round((icStats.closed+emailPts+wfPts+callPts)/hrs*10)/10:null;
      let t=`Hi ${name},\n\nYour individual performance summary for ${lb}.\n\nNAME: ${name}\nTEAM: ${teamName}\nPERIOD: ${lb}\n${"─".repeat(36)}\n\n`;
      t+=`PRODUCTIVITY\n`;
      if(autoScore!=null)t+=`  Score (auto): ${autoScore} pts/hr\n`;
      else if(d.productivity)t+=`  Score: ${d.productivity}${pu}\n`;
      else t+=`  Score: —\n`;
      if(ap)t+=`  Team average: ${ap}${pu}\n`;
      if(icStats){
        t+=`\nINTERCOM STATS\n`;
        t+=`  Tickets closed: ${icStats.closed} (1 pt each)\n`;
        if(icStats.medFirstReply!=null)t+=`  Median first reply: ${icStats.medFirstReply}h (target <4h)\n`;
        if(icStats.medClose!=null)t+=`  Median close time: ${icStats.medClose}h (target <8h)\n`;
        if(hrs!=null)t+=`  Hours worked: ${hrs}h\n`;
      }
      t+=`\nOVERALL: ${ps.length} passing, ${fl.length} missing\n`;
      if(ps.length){t+=`\nPASSING\n`;ps.forEach(k=>{t+=`  • ${k.label}: ${dv(d[k.key],k)} (target ${k.target})\n`;});}
      if(fl.length){t+=`\nNEEDS ATTENTION\n`;fl.forEach(k=>{t+=`  • ${k.label}: ${dv(d[k.key],k)} (target ${k.target})\n`;});}
      if(d._note)t+=`\nMANAGER NOTE\n${d._note}\n`;

    };
    return(
      <Modal title={name} sub={`${teamName} · Individual Stats`} onClose={()=>{setIMember(null);setIEdit(false);}} wide>

          <select value={iPt} onChange={e=>setIPt(e.target.value)} style={S.sel}><option value="month">Month</option><option value="week">FY25 Week</option></select>
          {iPt==="month"?<select value={iMo} onChange={e=>setIMo(e.target.value)} style={S.sel}>{MONTHS.map(m=><option key={m}>{m}</option>)}</select>

        </div>
        {(()=>{

          const tname=iMember?.teamName||"";

          const wfPts2=icStats?.wfs||0;
          const emailPts2=icStats?.emails||0;
          const callPts2=icStats?.calls||0;
          const autoScore=icStats&&hrs?Math.round((icStats.closed+emailPts2+wfPts2+callPts2)/hrs*10)/10:null;

            <>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(115px,1fr))",gap:9,marginBottom:icStats?10:14}}>
                {[{l:"Productivity",v:d.productivity?`${d.productivity}${pu}`:autoScore?`${autoScore} pts/hr`:"—",bg:"#f8fafc",c:"#1e293b"},
                  {l:"Team Avg",v:ap?`${ap}${pu}`:"—",bg:"#f8fafc",c:"#64748b"},
                  {l:"Passing",v:passK.length,bg:"#dcfce7",c:"#15803d"},
                  {l:"Missing",v:failK.length,bg:failK.length?"#fee2e2":"#f8fafc",c:failK.length?"#dc2626":"#64748b"}].map(c=>(

                    <div style={{fontSize:20,fontWeight:700,color:c.c}}>{c.v}</div>
                  </div>
                ))}
              </div>
              {icStats&&<div style={{background:"#f8fafc",borderRadius:9,border:"1px solid #e5e7eb",padding:"11px 14px",marginBottom:14}}>
                <div style={{fontWeight:600,fontSize:12,color:"#374151",marginBottom:9}}>Intercom stats — {lb}</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(125px,1fr))",gap:8}}>
                  <div><div style={{fontSize:11,color:"#94a3b8",marginBottom:2}}>Tickets closed</div><div style={{fontSize:18,fontWeight:700,color:"#1e293b"}}>{icStats.closed??0}</div><div style={{fontSize:11,color:"#64748b"}}>1 pt each</div></div>
                  {icStats.emails!=null&&<div><div style={{fontSize:11,color:"#94a3b8",marginBottom:2}}>Emails (Cases+Template)</div><div style={{fontSize:18,fontWeight:700,color:"#1e293b"}}>{icStats.emails}</div></div>}
                  {icStats.caseActions!=null&&<div><div style={{fontSize:11,color:"#94a3b8",marginBottom:2}}>Case Actions</div><div style={{fontSize:18,fontWeight:700,color:"#1e293b"}}>{icStats.caseActions}</div></div>}
                  {icStats.wfs!=null&&<div style={{background:"#f3eafa",borderRadius:7,padding:"8px 10px"}}><div style={{fontSize:11,color:"#7c3aab",marginBottom:2}}>WFs</div><div style={{fontSize:18,fontWeight:700,color:"#7c3aab"}}>{icStats.wfs}</div><div style={{fontSize:11,color:"#7c3aab"}}>1 pt each</div></div>}
                  {icStats.calls!=null&&<div style={{background:"#fef3c7",borderRadius:7,padding:"8px 10px"}}><div style={{fontSize:11,color:"#92400e",marginBottom:2}}>Calls</div><div style={{fontSize:18,fontWeight:700,color:"#92400e"}}>{icStats.calls}</div><div style={{fontSize:11,color:"#92400e"}}>1 pt each</div></div>}
                  <div><div style={{fontSize:11,color:"#94a3b8",marginBottom:2}}>Median first reply</div><div style={{fontSize:18,fontWeight:700,color:icStats.medFirstReply!=null&&icStats.medFirstReply<4?"#15803d":"#dc2626"}}>{icStats.medFirstReply!=null?`${icStats.medFirstReply}h`:"—"}</div><div style={{fontSize:11,color:"#64748b"}}>target &lt;4h</div></div>
                  <div><div style={{fontSize:11,color:"#94a3b8",marginBottom:2}}>Median close time</div><div style={{fontSize:18,fontWeight:700,color:icStats.medClose!=null&&icStats.medClose<8?"#15803d":"#dc2626"}}>{icStats.medClose!=null?`${icStats.medClose}h`:"—"}</div><div style={{fontSize:11,color:"#64748b"}}>target &lt;8h</div></div>
                  <div><div style={{fontSize:11,color:"#94a3b8",marginBottom:2}}>Hours worked</div><div style={{fontSize:18,fontWeight:700,color:"#1e293b"}}>{hrs!=null?`${hrs}h`:"—"}</div><div style={{fontSize:11,color:"#64748b"}}>{hrs==null?"upload schedule":""}</div></div>
                  {autoScore!=null&&<div style={{background:"#e8f1fb",borderRadius:7,padding:"8px 10px"}}><div style={{fontSize:11,color:"#1e6fcf",marginBottom:2}}>Auto productivity</div><div style={{fontSize:18,fontWeight:700,color:"#1e3a5f"}}>{autoScore}</div><div style={{fontSize:11,color:"#1e6fcf"}}>pts/hr</div></div>}

        {bars&&<div style={{background:"#f8fafc",borderRadius:9,padding:"11px 13px",marginBottom:14}}>

            <div key={l2} style={{marginBottom:6}}>

          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>

              <td style={{padding:"8px 11px",textAlign:"center",fontWeight:v?600:400}}>{dv(v,k)}</td><td style={{padding:"8px 11px",textAlign:"center"}}><Badge pass={p}/></td>

          </table>
        </div>}
        {!(d._kpis||[]).length&&!iEdit&&<div style={{background:"#f8fafc",borderRadius:9,padding:16,textAlign:"center",color:"#94a3b8",fontSize:13,marginBottom:14}}>No individual KPIs yet. Click "Edit Stats" to add metrics.</div>}
        {d._note&&!iEdit&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:9,padding:"10px 13px",marginBottom:14}}>

        {!iEdit&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

            {!(iVals._kpis||[]).length&&<div style={{fontSize:12,color:"#94a3b8",marginBottom:6}}>No KPIs yet.</div>}

                  <div><label style={{...S.lbl,fontSize:11}}>Threshold</label><input type="number" value={k.thresh} onChange={e=>setIVals(p=>({...p,_kpis:p._kpis.map((x,i)=>i===ki?{...x,thresh:+e.target.value||0}:x)}))} style={{...S.inp,fontSize:12}}/></div>
                  <div><label style={{...S.lbl,fontSize:11}}>Direction</label><select value={k.dir} onChange={e=>setIVals(p=>({...p,_kpis:p._kpis.map((x,i)=>i===ki?{...x,dir:e.target.value}:x)}))} style={{...S.sel,width:"100%",fontSize:12}}><option value="gt">Greater than</option><option value="lt">Less than</option><option value="bool">Yes / No</option></select></div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:7,alignItems:"end"}}>

                      :<input type="number" step="any" value={iVals[k.key]||""} onChange={e=>setIVals(p=>({...p,[k.key]:e.target.value}))} style={S.inp}/>}
                  </div>
                  <button onClick={()=>setIVals(p=>({...p,_kpis:p._kpis.filter((_,i)=>i!==ki)}))} style={S.danger}>Remove</button>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:9,justifyContent:"flex-end"}}>
            <button onClick={()=>setIEdit(false)} style={S.out}>Cancel</button>
            <button onClick={()=>{saveID(id,iPt,iMo,iWk,iVals);setIEdit(false);toast2("Saved.");}} style={S.p1}>Save</button>
          </div>
        </div>}
      </Modal>
    );
  }

            <div style={{width:30,height:30,borderRadius:7,background:"#1e3a5f",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontWeight:700,fontSize:12}}>BC</span></div>

            <span style={{fontSize:12,color:"#94a3b8"}}>Operations</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,background:isAdmin?"#1e3a5f":"#7c3aab",color:"#fff",padding:"2px 8px",borderRadius:4,fontWeight:600}}>{isAdmin?"Admin":"Team Lead"}</span>
            <span style={{fontSize:12,color:"#374151",fontWeight:500}}>{currentUser?.displayName}</span>
            <button onClick={logout} style={{fontSize:12,color:"#94a3b8",background:"none",border:"none",cursor:"pointer"}}>Sign out</button>
          </div>
        </div>
        <div style={{display:"flex",padding:"0 18px",overflowX:"auto"}}>
          {TABS.map(t=><button key={t} onClick={()=>setTab(t.toLowerCase())} style={{background:"none",border:"none",cursor:"pointer",whiteSpace:"nowrap",padding:"7px 11px",fontSize:13,fontWeight:tab===t.toLowerCase()?600:400,color:tab===t.toLowerCase()?"#1e3a5f":"#64748b",borderBottom:tab===t.toLowerCase()?"2px solid #1e3a5f":"2px solid transparent"}}>{t}</button>)}
        </div>
      </div>

      {isAdmin&&pendingEdits.filter(r=>r.status==="pending").length>0&&(
        <div style={{background:"#fffbeb",borderBottom:"1px solid #fde68a",padding:"8px 20px",display:"flex",alignItems:"center",gap:10,fontSize:13}}>
          <span style={{fontSize:16}}>⏳</span>
          <span style={{color:"#92400e",fontWeight:600}}>{pendingEdits.filter(r=>r.status==="pending").length} pending edit request(s) from team leaders</span>
          <button onClick={()=>setTab("access")} style={{background:"#1e3a5f",color:"#fff",border:"none",borderRadius:6,padding:"3px 12px",fontSize:12,cursor:"pointer",marginLeft:4}}>Review</button>
        </div>
      )}
      <div style={{maxWidth:1040,margin:"0 auto",padding:"16px 14px"}}>

        {(tab==="dashboard"||tab==="people")&&(
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:14,background:"#fff",padding:"10px 12px",borderRadius:12,border:"1px solid #e5e7eb"}}>
            <select value={team} onChange={e=>setTeam(e.target.value)} style={S.sel}>{tNames.map(t=><option key={t}>{t}</option>)}</select>
            {tab!=="individuals"&&<>
              <select value={pt} onChange={e=>setPt(e.target.value)} style={S.sel}><option value="month">By Month</option><option value="week">By FY25 Week</option></select>
              {pt==="month"?<select value={mo} onChange={e=>setMo(e.target.value)} style={S.sel}>{MONTHS.map(m=><option key={m}>{m}</option>)}</select>
                :<select value={wk} onChange={e=>setWk(+e.target.value)} style={S.sel}>{WEEKS.map(w=><option key={w.w} value={w.w}>{w.l}</option>)}</select>}
            </>}
            <div style={{flex:1}}/>
            {tab==="dashboard"&&<>
              <button onClick={()=>{setEditVals({...pData});setPendingNote("");setEditOpen(true);}} style={{...S.p1,background:isAdmin?"#1e3a5f":"#7c3aab"}}>{isAdmin?"+ Enter Data":"✎ Request Edit"}</button>
              <button onClick={()=>{
                if(pt!=="week"){toast2("Refresh works on weekly view — switch to By FY25 Week.");return;}

              <div><label style={S.lbl}>Period</label><select value={exPt} onChange={e=>setExPt(e.target.value)} style={{...S.sel,width:"100%"}}><option value="month">Month</option><option value="week">FY25 Week</option></select></div>
              <div><label style={S.lbl}>{exPt==="month"?"Month":"Week"}</label>
                {exPt==="month"?<select value={exMo} onChange={e=>setExMo(e.target.value)} style={{...S.sel,width:"100%"}}>{MONTHS.map(m=><option key={m}>{m}</option>)}</select>
                  :<select value={exWk} onChange={e=>setExWk(+e.target.value)} style={{...S.sel,width:"100%"}}>{WEEKS.map(w=><option key={w.w} value={w.w}>{w.l}</option>)}</select>}
              </div>
            </div>
            {(()=>{const etd=tc[exTm];if(!etd)return null;const epd=data[exTm]?.[ePK]||{};const er=roster[exTm]||{};const ep=etd.kpis.filter(k=>isPass(epd[k.key],k)===true).length;const ef=etd.kpis.filter(k=>isPass(epd[k.key],k)===false).length;return<>
              <div style={{background:"#f8fafc",borderRadius:9,border:"1px solid #e5e7eb",padding:14,marginBottom:13}}>
                <div style={{fontWeight:600,fontSize:13,color:"#374151",marginBottom:8}}>{exTm} · {exPt==="month"?exMo:`Week ${exWk}`} · Lead: {er.lead||"—"}</div>
                <div style={{display:"flex",gap:12,marginBottom:9,flexWrap:"wrap"}}>
                  <span style={{fontSize:13,color:"#15803d",fontWeight:600}}>✓ {ep} Passing</span>
                  <span style={{fontSize:13,color:"#dc2626",fontWeight:600}}>✗ {ef} Missing</span>
                  <span style={{fontSize:13,color:"#94a3b8"}}>{etd.kpis.length-ep-ef} No data</span>
                </div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",fontSize:12,borderCollapse:"collapse",minWidth:320}}>
                    <thead><tr style={{background:"#fff"}}>{["KPI","Target","Actual","Status"].map(h=><th key={h} style={{padding:"6px 9px",textAlign:h==="KPI"?"left":"center",fontWeight:600,color:"#374151",borderBottom:"1px solid #e5e7eb"}}>{h}</th>)}</tr></thead>
                    <tbody>{etd.kpis.map((k,i)=>{const v=epd[k.key];const p=isPass(v,k);return<tr key={k.key} style={{background:i%2?"#fafafa":"#fff"}}>
                      <td style={{padding:"6px 9px"}}>{k.label}</td><td style={{padding:"6px 9px",textAlign:"center",color:"#64748b"}}>{k.target}</td>
                      <td style={{padding:"6px 9px",textAlign:"center",fontWeight:v?600:400}}>{dv(v,k)}</td><td style={{padding:"6px 9px",textAlign:"center"}}><Badge pass={p}/></td>
                    </tr>;})}
                    </tbody>
                  </table>
                </div>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={()=>dlCSV(exTm,ePK)} style={S.p1}>Download CSV</button>
                <button onClick={()=>printPDF(exTm,ePK)} style={S.out}>Print / Save PDF</button>
                <button onClick={()=>copy(emailTxt(exTm,ePK))} style={S.out}>Copy Email to {er.lead||"Lead"}</button>
              </div>
            </>})()}
          </div>
          <div style={{background:"#fff",borderRadius:11,border:"1px solid #e5e7eb",padding:20}}>
            <div style={{fontWeight:700,fontSize:13,color:"#1e293b",marginBottom:4}}>Batch Export — All Teams</div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:10}}>Download CSV for all teams for the selected period.</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{tNames.map(t=><button key={t} onClick={()=>dlCSV(t,ePK)} style={S.out}>Download {t}</button>)}</div>
          </div>
        </div>}

        {tab==="access"&&isAdmin&&<AccessTab/>}

        {tab==="settings"&&<div style={{maxWidth:560}}>

          {/* Supabase */}
          <div style={{background:"#fff",borderRadius:11,border:"1px solid #e5e7eb",padding:20,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <div style={{fontWeight:700,fontSize:13,color:"#1e293b"}}>Supabase Database</div>
              {sbStatus==="ok"&&<span style={{fontSize:11,background:"#dcfce7",color:"#15803d",borderRadius:4,padding:"1px 8px",fontWeight:600}}>Connected</span>}
              {sbStatus==="error"&&<span style={{fontSize:11,background:"#fee2e2",color:"#dc2626",borderRadius:4,padding:"1px 8px",fontWeight:600}}>Error</span>}
              {sbStatus==="needtable"&&<span style={{fontSize:11,background:"#fffbeb",color:"#92400e",borderRadius:4,padding:"1px 8px",fontWeight:600}}>Needs Setup</span>}
              {sbStatus==="testing"&&<span style={{fontSize:11,background:"#e8f1fb",color:"#1e6fcf",borderRadius:4,padding:"1px 8px",fontWeight:600}}>Testing...</span>}
            </div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:14,lineHeight:1.6}}>
              Connect a free Supabase database so your data persists across browsers and computers — no more worrying about browser cache.
              <a href="https://supabase.com" target="_blank" style={{color:"#1e6fcf",marginLeft:4}}>Sign up free at supabase.com →</a>
            </div>
            <div style={{marginBottom:10}}>
              <label style={S.lbl}>Project URL</label>
              <input value={sbUrl} onChange={e=>setSbUrl(e.target.value.trim())} placeholder="https://mdrvugdzlocogmjbmzow.supabase.co" style={S.inp}/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={S.lbl}>Anon Public Key</label>
              <input value={sbKey} onChange={e=>setSbKey(e.target.value.trim())} placeholder="eyJ... (Legacy anon key) or sb_publishable_..." style={S.inp}/>
            </div>
            {sbMsg&&<div style={{fontSize:12,marginBottom:12,padding:"8px 12px",borderRadius:7,background:sbStatus==="ok"?"#f0fdf4":sbStatus==="error"?"#fee2e2":"#fffbeb",color:sbStatus==="ok"?"#15803d":sbStatus==="error"?"#dc2626":"#92400e"}}>{sbMsg}</div>}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:sbStatus==="needtable"?12:0}}>
              <button onClick={testSupabase} style={{...S.p1}} disabled={!sbUrl||!sbKey}>Test Connection</button>
              {sbStatus==="ok"&&<button onClick={loadFromSupabase} style={S.out}>↓ Load from Supabase</button>}
              {sbStatus==="ok"&&<button onClick={syncToSupabase} style={S.out}>↑ Push local data now</button>}
            </div>
            {sbStatus==="needtable"&&<div style={{background:"#f8fafc",borderRadius:8,padding:"12px 14px",fontSize:12,color:"#374151",lineHeight:1.8}}>
              <div style={{fontWeight:600,marginBottom:6}}>One-time table setup — run this in Supabase SQL Editor:</div>
              <code style={{display:"block",background:"#1e293b",color:"#e2e8f0",padding:"10px 14px",borderRadius:6,fontSize:11,whiteSpace:"pre-wrap",userSelect:"all"}}>{"create table if not exists bc_store (\n  key text primary key,\n  value text,\n  updated_at timestamptz default now()\n);\nalter table bc_store enable row level security;\ncreate policy \"allow all\" on bc_store for all using (true) with check (true);"}</code>
              <div style={{marginTop:8,color:"#64748b"}}>Go to your Supabase project → SQL Editor → New query → paste above → Run. Then click Test Connection again.</div>
            </div>}
          </div>

          {/* Local backup */}
          <div style={{background:"#fff",borderRadius:11,border:"1px solid #e5e7eb",padding:20,marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:13,color:"#1e293b",marginBottom:4}}>Local Backup</div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:12}}>Download a JSON snapshot of all data as a safety net.</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button onClick={()=>{const blob=new Blob([JSON.stringify({...data,_r:roster,_tc:tc},null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`Bachcare_backup_${Date.now()}.json`;a.click();URL.revokeObjectURL(url);toast2("Backup downloaded.");}} style={S.out}>Download Backup</button>
              <button onClick={()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r2=new FileReader();r2.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d._r)setRoster(d._r);if(d._tc)setTc(d._tc);const{_r,_tc,...rest}=d;setData(prev=>mg(prev,rest));toast2("Backup restored.");}catch{toast2("Invalid file.");}};r2.readAsText(f);};inp.click();}} style={S.out}>Restore Backup</button>
            </div>
          </div>
          <div style={{background:"#fff",borderRadius:11,border:"1px solid #e5e7eb",padding:20,marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:13,color:"#1e293b",marginBottom:6}}>Password</div>
            <div style={{fontSize:13,color:"#64748b",lineHeight:1.7}}>Current password: <strong>Bachcare2025</strong><br/>To change it, open <code style={{background:"#f1f5f9",padding:"1px 5px",borderRadius:3}}>index.html</code> and update the <code style={{background:"#f1f5f9",padding:"1px 5px",borderRadius:3}}>APP_PW</code> value near the top of the script, then re-upload the file to GitHub.</div>
          </div>
          <div style={{background:"#fff",borderRadius:11,border:"1px solid #e5e7eb",padding:20}}>
            <div style={{fontWeight:700,fontSize:13,color:"#1e293b",marginBottom:6}}>About</div>
            <div style={{fontSize:13,color:"#64748b",lineHeight:1.8}}>Bachcare Operations Report Organiser<br/>Platforms: Airbnb · Booking.com · VRBO<br/>FY25: October 2025 – September 2026</div>
          </div>
        </div>}

      </div>

      {editOpen&&<Modal title={isAdmin?`Enter Data — ${team}`:`Request Edit — ${team}`} sub={pt==="month"?mo:`FY25 Week ${wk}`} onClose={()=>setEditOpen(false)}
        footer={<><button onClick={()=>setEditOpen(false)} style={S.out}>Cancel</button><button onClick={saveTeam} style={S.p1}>Save</button></>}>
        {kpis.map(k=>(
          <div key={k.key} style={{marginBottom:12}}>
            <label style={{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:600,color:"#374151",marginBottom:3}}>
              <span>{k.label}</span><span style={{color:"#94a3b8",fontWeight:400}}>{k.target}</span>
            </label>
            {k.dir==="bool"?<select value={editVals[k.key]||""} onChange={e=>setEditVals(p=>({...p,[k.key]:e.target.value}))} style={{...S.sel,width:"100%"}}><option value="">— not set —</option><option value="yes">Yes</option><option value="no">No</option></select>
              :<input type="number" step="any" value={editVals[k.key]??""} onChange={e=>setEditVals(p=>({...p,[k.key]:e.target.value}))} placeholder={`Value${k.unit?" ("+k.unit+")":""}`} style={S.inp}/>}
          </div>
        ))}
      </Modal>}

      {iMember&&<IndivPanel/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>


</body></html>
