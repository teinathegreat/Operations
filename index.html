.bc-sidebar-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:#14b8a6;border-radius:0 3px 3px 0;}

function Modal({title,sub,onClose,children,footer,wide}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:20,animation:"fadeUp .2s ease"}}>
      <div style={{background:"#fff",borderRadius:10,width:"100%",maxWidth:wide?740:540,maxHeight:"90vh",display:"flex",flexDirection:"column",boxShadow:"0 25px 60px rgba(0,0,0,.15)"}}>
        <div style={{padding:"16px 22px",borderBottom:"1px solid #f3f4f6",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div><div style={{fontWeight:700,fontSize:16,color:"#111827"}}>{title}</div>{sub&&<div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>{sub}</div>}</div>
          <button onClick={onClose} style={{background:"#f9fafb",border:"1px solid #e5e7eb",cursor:"pointer",fontSize:16,color:"#9ca3af",lineHeight:1,width:30,height:30,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        <div style={{padding:"18px 22px",overflowY:"auto",flex:1}}>{children}</div>
        {footer&&<div style={{padding:"14px 22px",borderTop:"1px solid #f3f4f6",display:"flex",gap:10,justifyContent:"flex-end",flexShrink:0}}>{footer}</div>}
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(err){return{error:err};}
  render(){
    if(this.state.error)return(
      <div style={{padding:40,fontFamily:"'Plus Jakarta Sans',sans-serif",maxWidth:500,margin:"40px auto"}}>
        <div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:12,padding:20}}>
          <div style={{fontWeight:700,color:"#dc2626",marginBottom:8}}>Something went wrong</div>
          <div style={{fontSize:13,color:"#991b1b",marginBottom:16}}>{this.state.error.message}</div>
          <button onClick={()=>window.location.reload()} style={{background:"#0d9488",color:"#fff",border:"none",borderRadius:6,padding:"8px 16px",cursor:"pointer"}}>Reload App</button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

  // Parse Intercom day-format CSV (closed/replies by agent by day)
  const parseIcDayCSV=(text)=>{
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    const parseRow=(line)=>{const vals=[];let cur="";let inq=false;for(const ch of line){if(ch==='"'){inq=!inq;}else if(ch===','&&!inq){vals.push(cur.trim().replace(/^"|"$/g,""));cur="";}else cur+=ch;}vals.push(cur.trim().replace(/^"|"$/g,""));return vals;};
    // Read title (row 0) and metadata (row 3) for date range detection
    const title=(lines[0]||"").replace(/"/g,"").trim();
    let dateFrom=null;
    for(let i=0;i<lines.length;i++){
      if(lines[i].includes("Time period from")){
        const meta=parseRow(lines[i+1]||"");
        dateFrom=meta[5]||null; // "2026-03-21 00:00"
        break;
      }
    }
    // Find header row — handles two formats:
    // Format A: header="Action performed by", next row=day names, then agents
    // Format B: header="Action performed by","Mar 9","Mar 10"... (days in header), then agents
    let hIdx=-1;
    for(let i=0;i<lines.length;i++){if(lines[i].includes("Action performed by")&&!lines[i].includes("Metric")){hIdx=i;break;}}
    if(hIdx<0)return null;
    const headerRow=parseRow(lines[hIdx]||"");
    // If header has more than 1 column and second column looks like a date ("Mar 9", "Apr 1" etc),
    // the days ARE in the header row (Format B)
    const isFormatB=headerRow.length>1&&/^[A-Z][a-z]+ \d/.test(headerRow[1]);
    let days, dataStartIdx;
    if(isFormatB){
      days=headerRow.slice(1);
      dataStartIdx=hIdx+1;
    } else {
      const dayRow=parseRow(lines[hIdx+1]||"");
      days=dayRow.slice(1);
      dataStartIdx=hIdx+2;
    }
    const rows=[];
    for(let i=dataStartIdx;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const vals=parseRow(lines[i]);
      const agent=vals[0];if(!agent)continue;
      const counts={};
      // Strip thousand-separator commas from numbers before parsing
      days.forEach((d,j)=>{counts[d]=parseInt((vals[j+1]||"0").replace(/,/g,""))||0;});
      rows.push({agent,counts});
    }
    return{title,dateFrom,days,rows};
  };

  // Detect FY25 week from a date string like "2026-03-21 00:00"
  const wkFromDateStr=(ds)=>{
    if(!ds)return null;
    // Use string comparison to avoid JS timezone issues with new Date()
    const d=ds.slice(0,10); // "YYYY-MM-DD"
    for(const[w,s,e] of FY25_WK_RANGES){
      if(d>=s&&d<=e)return w;
    }
    return null;
  };

  // Auto-fill KPIs from report data into the team dashboard
    const autoFillKPIs=(teamName,wk,updates)=>{

    const wkRange=FY25_WK_RANGES.find(r=>r[0]===wk);
    const monthPk=wkRange?(()=>{
      const d=new Date(wkRange[1]);
      return`m__${d.toLocaleString("en-NZ",{month:"long",year:"numeric"})}`;
    })():null;
    setData(prev=>{
      const ex=prev[teamName]?.[pk]||{};
      const next={...prev,[teamName]:{...(prev[teamName]||{}),[pk]:{...ex,...updates,_autoFilled:nowNZ()}}};
      // Also write to monthly period (merge, don't overwrite manual entries)
      if(monthPk){
        const exM=next[teamName]?.[monthPk]||{};
        const mergedM={...exM};
        Object.entries(updates).forEach(([k,v])=>{
          // Only write if not already manually set (no _autoFilled means manual)
          if(!exM[k]||exM._autoFilled)mergedM[k]=v;

  // Re-run auto-fill for a specific team + week using already-loaded data
  const recalcForPeriod=(teamName,wkNum)=>{
    const updates={};

    const _w=getW(tname);const totalPts=tickets*_w.tickets+emails*_w.emails+wfs*_w.wfs+calls*_w.calls;
    const teamHrs=Object.values(schedData)

    return 0;

    // Handle ANY Intercom file — detects type automatically
  const handleIcFile=(e)=>{

          const dayToWk={};
          parsed.days.forEach(day=>{

              }

          });

          // Auto-fill productivity KPIs for each team
          // Productivity = (team tickets × pts) ÷ team hours
          // We store the raw ticket count now; pts/hr computed when hours are available
          // Auto-fill KPIs for each week found in this CSV
          allWks.forEach(wkN=>{

        }

        // ── TYPE B: Replies by Agent per Day ─────────────────────────────
        else if(firstLine.toLowerCase().includes("replies by agent")||firstLine.toLowerCase().includes("replies by")){

          const hdrs=parseRow2(lines2[0]);

          let filled=0;

        }

        else if(text.includes("Case Actions")||text.includes("Work_Completed")||text.includes("Template Comms")){

                iTemplateComms=col("Template Comms"),iWFs=col("WFs"),iTasks=col("Tasks"),iTotal=col("Total");
          if(iAgent<0){toast2("Missing Agent column in Work Completed report.");return;}

            let dateStr=fullDate;

              if(parts.length===3){

              .filter(([n])=>getPersonTeam(n)===tname)

            const totalPoints=closedTickets*weights.tickets+emailPoints*weights.emails+wfPoints*weights.wfs;

                    <input value={addNameTm===tn?addName:""} onChange={e=>{setAddNameTm(tn);setAddName(e.target.value);}} onKeyDown={e=>{if(e.key==="Enter"&&addNameTm===tn)addMember(tn);}} placeholder="Add member..." style={{...S.inp,flex:1,padding:"5px 8px",fontSize:12}}/>

                  </div>}

    );

        <strong>PeopleTab Error:</strong><br/>{err.message}<br/><pre style={{fontSize:11,marginTop:8}}>{err.stack}</pre>
      </div>;
    }
  }

  function CallReviewsTab(){
    const selMonth=crSelMonth||mo;const setSelMonth=setCrSelMonth;
    React.useEffect(()=>{setCrSelMonth(mo);},[mo]);
    const formOpen=crFormOpen;const setFormOpen=setCrFormOpen;
    const editReview=crEditReview;const setEditReview=setCrEditReview;
    // filterAgent lifted to App scope
    const viewReview=crViewReview;const setViewReview=setCrViewReview;
    const expandedAgent=crExpandedAgent;const setExpandedAgent=setCrExpandedAgent;

    // Determine which team - use global team selector
    const myTeam=isAdmin?team:(allowedTeams.length>1?team:(currentUser?.team||null));
    const isAllCR=myTeam==="All Teams";
    const myTeamMembers=isAllCR?Object.entries(roster).filter(([tn])=>callReviewTeams.includes(tn)).flatMap(([,t])=>(t.members||[]).map(m=>m.name))
      :myTeam?(roster[myTeam]?.members||[]).map(m=>m.name)
      :Object.entries(roster).filter(([tn])=>callReviewTeams.includes(tn)).flatMap(([,t])=>(t.members||[]).map(m=>m.name));
    const allAgents=myTeamMembers;
    const crKpiDef=(isAllCR?null:(tc[myTeam]?.kpis||tc[Object.keys(tc)[0]]?.kpis||[]).find(k=>k.key==="call_reviews_count"));
    const defaultTarget=crKpiDef?.thresh||8;
    // Per-agent target based on their team's threshold
    const getAgentTarget=(agentName)=>{
      for(const[tn,td] of Object.entries(roster)){
        if(td.lead===agentName||(td.members||[]).some(m=>m.name===agentName)){
          const kpi=(tc[tn]?.kpis||[]).find(k=>k.key==="call_reviews_count");
          return kpi?.thresh||8;
        }
      }
      return defaultTarget;
    };
    const totalTarget=allAgents.reduce((s,n)=>s+getAgentTarget(n),0);

    const monthReviews=callReviews.filter(r=>
      r.month===selMonth&&(isAllCR||!myTeam||r.team===myTeam)
    );
    // Stats reflect the selected agent when one is chosen
    const statsReviews=filterAgent==="all"?monthReviews:monthReviews.filter(r=>r.agentName===filterAgent);
    const passCount=statsReviews.filter(r=>r.passed).length;
    const passRate=statsReviews.length?Math.round(passCount/statsReviews.length*100):0;
    // For header counts: when filtered to one agent, target is just 8; agents count is 1
    const statsAgentCount=filterAgent==="all"?allAgents.length:1;
    const statsTotal=filterAgent==="all"?totalTarget:getAgentTarget(filterAgent);
    const statsReviewCount=statsReviews.length;

    // Per-agent breakdown
    const agentStats={};
    allAgents.forEach(name=>{
      const reviews=monthReviews.filter(r=>r.agentName===name);
      const passed=reviews.filter(r=>r.passed).length;
      agentStats[name]={total:reviews.length,passed,rate:reviews.length?Math.round(passed/reviews.length*100):null};
    });

    const filteredReviews=monthReviews.filter(r=>filterAgent==="all"||r.agentName===filterAgent)
      .sort((a,b)=>new Date(b.date)-new Date(a.date));

    const deleteReview=(id)=>{
      if(!window.confirm("Delete this review?"))return;
      const upd=callReviews.filter(r=>r.id!==id);setCallReviews(upd);forceSaveArr("call_reviews",upd);
      addAudit("Call Review Deleted","Review ID "+id);
      toast2("Review deleted.");
    };

    return(<div>
      {/* Header stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:18}}>
        <div style={{background:"#fff",borderRadius:10,border:"1px solid #e5e7eb",padding:"16px 18px",boxShadow:"0 1px 2px rgba(0,0,0,.04)"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".4px",marginBottom:6}}>Reviews This Month</div>
          <div style={{fontSize:32,fontWeight:800,color:"#111827",lineHeight:1}}>{statsReviewCount}</div>
          <div style={{fontSize:12,color:"#6b7280",marginTop:4}}>of {statsTotal} target{filterAgent!=="all"?" · "+filterAgent:""}</div>
          <div style={{height:4,background:"#f3f4f6",borderRadius:2,marginTop:8}}>
            <div style={{height:4,background:statsReviewCount>=statsTotal?"#059669":"#0d9488",borderRadius:2,width:Math.min(100,Math.round(statsReviewCount/Math.max(statsTotal,1)*100))+"%",transition:"width .3s"}}/>
          </div>
        </div>
        <div style={{background:"#fff",borderRadius:10,border:"1px solid #e5e7eb",padding:"16px 18px",boxShadow:"0 1px 2px rgba(0,0,0,.04)"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".4px",marginBottom:6}}>Pass Rate</div>
          <div style={{fontSize:32,fontWeight:800,color:passRate>=95?"#059669":passRate>=80?"#d97706":"#dc2626",lineHeight:1}}>{statsReviews.length?passRate+"%":"—"}</div>
          <div style={{fontSize:12,color:"#6b7280",marginTop:4}}>Target &gt;95%</div>
        </div>
        <div style={{background:"#fff",borderRadius:10,border:"1px solid #e5e7eb",padding:"16px 18px",boxShadow:"0 1px 2px rgba(0,0,0,.04)"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".4px",marginBottom:6}}>Per Agent Target</div>
          <div style={{fontSize:32,fontWeight:800,color:"#111827",lineHeight:1}}>{filterAgent!=="all"?getAgentTarget(filterAgent):defaultTarget}</div>
          <div style={{fontSize:12,color:"#6b7280",marginTop:4}}>{statsAgentCount} agent{statsAgentCount!==1?"s":""} · {statsTotal} total</div>
        </div>
        <div style={{background:"#111827",borderRadius:10,padding:"16px 18px",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <button onClick={()=>{setEditReview(null);setFormOpen(true);}} style={{background:"#0d9488",border:"none",borderRadius:8,color:"#fff",padding:"10px 20px",fontSize:14,cursor:"pointer",fontWeight:700,width:"100%"}}>+ New Review</button>
        </div>
      </div>

      {/* Controls */}
      

      {/* Per-agent breakdown — table */}
      <div style={{background:"#fff",borderRadius:10,border:"1px solid #e5e7eb",overflow:"visible",marginBottom:16}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid #e5e7eb",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontWeight:700,fontSize:14,color:"#111827",flex:1}}>Agent Progress — {selMonth}{filterAgent!=="all"?" · "+filterAgent:""}</span>
          <span style={{fontSize:11,color:"#9ca3af"}}>Target varies by team · click row to expand</span>
        </div>
        <div style={{overflowX:"auto"}}>
          <table key={filterAgent} style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{background:"#f9fafb"}}>
              {["Agent","Reviews","Pass","Fail","Pass Rate","Progress"].map(h=><th key={h} style={{padding:"9px 14px",textAlign:h==="Agent"?"left":"center",fontWeight:600,color:"#6b7280",borderBottom:"1px solid #e5e7eb",fontSize:11,textTransform:"uppercase",letterSpacing:".04em"}}>{h}</th>)}
            </tr></thead>
            <tbody>{allAgents.filter(n=>filterAgent==="all"||n===filterAgent).sort().map((name,i)=>{
              const st=agentStats[name]||{total:0,passed:0,rate:null};
              const agt=getAgentTarget(name);const pct=Math.min(100,Math.round(st.total/agt*100));
              const done=st.total>=agt;
              const isExpanded=expandedAgent===name;
              const agentRevs=monthReviews.filter(r=>r.agentName===name).sort((a,b)=>new Date(b.date)-new Date(a.date));
              return(<React.Fragment key={name}>
                <tr onClick={()=>setExpandedAgent(isExpanded?null:name)}
                  style={{background:isExpanded?"#f0fdfa":i%2?"#f9fafb":"#fff",borderBottom:isExpanded?"none":"1px solid #f3f4f6",cursor:"pointer",transition:"background .1s"}}
                  onMouseEnter={e=>{if(!isExpanded)e.currentTarget.style.background="#f9fafb";}}
                  onMouseLeave={e=>{e.currentTarget.style.background=isExpanded?"#f0fdfa":i%2?"#f9fafb":"#fff";}}>
                  <td style={{padding:"9px 14px",fontWeight:500,color:"#111827"}}>
                    <span style={{fontSize:10,color:"#9ca3af",marginRight:6,display:"inline-block",transform:isExpanded?"rotate(90deg)":"rotate(0deg)",transition:"transform .15s"}}>▶</span>
                    {name}
                  </td>
                  <td style={{padding:"9px 14px",textAlign:"center"}}>
                    <span style={{fontWeight:700,color:done?"#059669":"#111827"}}>{st.total}</span>
                    <span style={{color:"#9ca3af",fontSize:11}}>/{getAgentTarget(name)}</span>
                  </td>
                  <td style={{padding:"9px 14px",textAlign:"center",color:"#059669",fontWeight:600}}>{st.passed||"—"}</td>
                  <td style={{padding:"9px 14px",textAlign:"center",color:st.total-st.passed>0?"#dc2626":"#d1d5db",fontWeight:st.total-st.passed>0?600:400}}>{st.total-st.passed||"—"}</td>
                  <td style={{padding:"9px 14px",textAlign:"center"}}>
                    {st.rate!==null?<span style={{fontWeight:700,color:st.rate>=95?"#059669":st.rate>=80?"#d97706":"#dc2626"}}>{st.rate}%</span>:<span style={{color:"#d1d5db"}}>—</span>}
                  </td>
                  <td style={{padding:"9px 14px",minWidth:110}}>
                    <div style={{height:5,background:"#f3f4f6",borderRadius:3}}>
                      <div style={{height:5,background:done?"#059669":"#0d9488",borderRadius:3,width:pct+"%",transition:"width .3s"}}/>
                    </div>
                    <div style={{fontSize:10,color:"#9ca3af",marginTop:2,textAlign:"center"}}>{pct}%</div>

                </tr>
                {isExpanded&&<tr style={{background:"#f9fafb"}}>
                  <td colSpan={6} style={{padding:"0 0 8px 0",borderBottom:"2px solid #e5e7eb"}}>
                    {!agentRevs.length
                      ?<div style={{padding:"16px 20px",color:"#9ca3af",fontSize:13,fontStyle:"italic"}}>No reviews for {name} in {selMonth}.</div>
                      :agentRevs.map(rev=>(

                              <span style={{fontSize:11,padding:"2px 8px",borderRadius:6,background:rev.passed?"#ecfdf5":"#fef2f2",color:rev.passed?"#059669":"#dc2626",fontWeight:700,border:"1px solid "+(rev.passed?"#a7f3d0":"#fecaca")}}>{rev.passed?"Pass ✓":"Needs Improvement ✗"}</span>
                              <span style={{fontSize:12,color:"#6b7280"}}>{fmtNZDate(rev.date)}</span>
                              <span style={{fontSize:11,color:"#9ca3af"}}>{rev.score}/{REVIEW_CRITERIA.length} criteria</span>
                              {rev.callType&&<span style={{fontSize:11,background:"#f3f4f6",borderRadius:6,padding:"1px 6px"}}>{rev.callType}</span>}
                              {rev.escalated===true&&<span style={{fontSize:11,padding:"1px 7px",borderRadius:6,background:rev.escalationJustified===false?"#fef2f2":"#fff7ed",color:rev.escalationJustified===false?"#dc2626":"#92400e",fontWeight:600}}>⚠ {rev.escalationJustified===false?"Avoidable":"Escalated"}</span>}
                            </div>
                            {rev.callLink&&<div style={{fontSize:11,marginBottom:2}}><a href={rev.callLink} target="_blank" style={{color:"#0d9488",textDecoration:"none"}}>🔗 {rev.callLink.length>60?rev.callLink.slice(0,60)+"...":rev.callLink}</a></div>}
                            {rev.notes&&<div style={{fontSize:11,color:"#6b7280",fontStyle:"italic"}}>"{rev.notes}"</div>}
                          </div>
                          <div style={{display:"flex",gap:4,flexShrink:0}}>
                            <button onClick={e=>{e.stopPropagation();setViewReview(rev);}} style={{...S.ghost,color:"#0d9488",fontSize:11}}>View</button>
                            {isAdmin&&<button onClick={e=>{e.stopPropagation();setEditReview(rev);setFormOpen(true);}} style={{...S.ghost,fontSize:11}}>Edit</button>}
                            {isAdmin&&<button onClick={e=>{e.stopPropagation();deleteReview(rev.id);}} style={{...S.ghost,color:"#dc2626",fontSize:11}}>Delete</button>}
                          </div>
                        </div>
                    ))}
                  </td>
                </tr>}
              </React.Fragment>);
            })}</tbody>
          </table>
        </div>
      </div>

      {formOpen&&<ReviewForm month={selMonth} team={myTeam} agents={allAgents}
        existing={editReview}
        onClose={()=>{setFormOpen(false);setEditReview(null);}}
        onSave={(rev)=>{
          if(editReview){
            setCallReviews(prev=>prev.map(r=>r.id===rev.id?rev:r));
            addAudit("Call Review Updated",`${rev.agentName} · ${rev.month}`);
          } else {
            setCallReviews(prev=>[rev,...prev]);
            addAudit("Call Review Submitted",`${rev.agentName} · ${rev.month} · ${rev.passed?"Pass":"Needs Improvement"}`);
          }
          setFormOpen(false);setEditReview(null);
          toast2("Review saved.");
        }}/>}

      {/* View review modal */}
      {viewReview&&<Modal title="Call Review Details" onClose={()=>setViewReview(null)}>
        <div style={{marginBottom:12}}>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
            <span style={{fontWeight:700,fontSize:15}}>{viewReview.agentName}</span>
            <span style={{fontSize:12,padding:"3px 10px",borderRadius:16,background:viewReview.passed?"#ecfdf5":"#fee2e2",color:viewReview.passed?"#059669":"#dc2626",fontWeight:700}}>{viewReview.passed?"Pass ✓":"Needs Improvement ✗"}</span>
          </div>
          <div style={{fontSize:13,color:"#6b7280",marginBottom:4}}>Date: {fmtNZDate(viewReview.date)} · Reviewed by: {viewReview.reviewedBy}</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:4}}>

          {viewReview.callLink&&<div style={{marginBottom:8}}><a href={viewReview.callLink} target="_blank" style={{color:"#0d9488",fontSize:13}}>🔗 {viewReview.callLink}</a></div>}
          {viewReview.callSummary&&<div style={{marginTop:8,padding:"10px 14px",background:"#f9fafb",borderRadius:8,border:"1px solid #e5e7eb"}}>
            <div style={{fontSize:11,fontWeight:600,color:"#6b7280",textTransform:"uppercase",letterSpacing:".04em",marginBottom:4}}>Call Summary</div>
            <div style={{fontSize:13,color:"#111827",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{viewReview.callSummary}</div>
          </div>}

            <div style={{fontSize:11,fontWeight:600,color:"#92400e",textTransform:"uppercase",letterSpacing:".04em",marginBottom:4}}>Advisories</div>
            <div style={{fontSize:13,color:"#78350f",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{viewReview.advisories}</div>
          </div>}
        </div>
        <div style={{borderTop:"1px solid #f3f4f6",paddingTop:12}}>
          {REVIEW_CRITERIA.map(cr=>{
            const val=viewReview.criteria?.[cr.id];
            return(<div key={cr.id} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"8px 0",borderBottom:"1px solid #f9fafb"}}>

                <div style={{fontSize:11,color:"#9ca3af"}}>{cr.desc}</div>

          <button onClick={()=>setViewReview(null)} style={S.p1}>Close</button>

      </Modal>}

  function ReviewForm({month,team,agents,existing,onClose,onSave}){
    const[agentName,setAgentName]=React.useState(existing?.agentName||"");

    const[callDate,setCallDate]=React.useState(existing?.date||todayNZ());

        </div>
      </div>

      const s=new Date(range[1]),e=new Date(range[2]);const days=[];

                  <span style={{fontSize:14}}>{r.type==="note"?"📝":r.type==="link"?"🔗":"📎"}</span>

              {/* File Preview Modal */}
              {qrPreview&&<div onClick={()=>setQrPreview2(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

                  <div style={{padding:16}}>{isImage(qrPreview.fileName)?<img src={qrPreview.file} style={{maxWidth:"85vw",maxHeight:"80vh",borderRadius:8}}/>:isPDF(qrPreview.fileName)?<iframe src={qrPreview.file} style={{width:"85vw",height:"80vh",border:"none",borderRadius:8}}/>:<div style={{textAlign:"center",padding:40}}><span style={{fontSize:40}}>📎</span><div style={{fontSize:14,color:"#6b7280",marginTop:8}}>{qrPreview.fileName}</div><button onClick={()=>{const a=document.createElement("a");a.href=qrPreview.file;a.download=qrPreview.fileName;a.click();}} style={{...S.p1,marginTop:12}}>Download File</button></div>}</div>

        {tab==="transcribe"&&<div style={{maxWidth:900}}>

            <div><div style={{fontSize:18,fontWeight:700,color:"#111827"}}>Transcribe Audio</div><div style={{fontSize:13,color:"#9ca3af"}}>Upload a call recording and get a text transcript. Runs free in your browser, no API key needed.</div></div>
          </div>

          {/* Upload area */}
          <div style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",padding:"20px 24px",marginBottom:20}}>
            <div onDragOver={e=>{e.preventDefault();setTxDragging(true);}} onDragLeave={()=>setTxDragging(false)} onDrop={e=>{e.preventDefault();setTxDragging(false);const f=e.dataTransfer?.files?.[0];if(!f)return;if(f.size>100*1024*1024)return toast2("File too large.");setTxFile(f);setTxFileName(f.name);setTxResult("");setTxStatus("idle");}} style={{border:"2px dashed "+(txDragging?"#0d9488":txFile?"#a7f3d0":"#d1d5db"),borderRadius:12,padding:txFile?"16px 20px":"40px 20px",textAlign:"center",cursor:"pointer",background:txDragging?"#ecfdf5":txFile?"#f0fdf4":"#f9fafb",transition:"all .15s"}} onClick={()=>{if(!txFile){const inp=document.createElement("input");inp.type="file";inp.accept=".wav,.mp3,.mp4,.m4a,.ogg,.webm,.flac";inp.onchange=e2=>{const f=e2.target?.files?.[0];if(!f)return;setTxFile(f);setTxFileName(f.name);setTxResult("");setTxStatus("idle");};inp.click();}}}>
              {txFile?<div style={{display:"flex",alignItems:"center",gap:12}}>

              </div>:<div>
                <div style={{fontSize:32,marginBottom:8}}>🎙️</div>

              <button disabled={txStatus==="loading"} onClick={async()=>{
                setTxStatus("loading");setTxResult("");setTxProgress("Loading transcription model (first time may take a minute)...");
                try{
                  if(!window._txPipeline){
                    setTxProgress("Downloading AI model (~250MB, cached after first use)...");
                    const{pipeline}=await import("https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2");
                    setTxProgress("Initialising model...");
                    window._txPipeline=await pipeline("automatic-speech-recognition","Xenova/whisper-small.en",{dtype:"q8"});
                  }
                  setTxProgress("Reading audio file...");
                  const audioCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
                  const arrBuf=await txFile.arrayBuffer();
                  const audioBuf=await audioCtx.decodeAudioData(arrBuf);
                  const ch=audioBuf.getChannelData(0);
                  const float32=new Float32Array(ch.length);
                  for(let i=0;i<ch.length;i++)float32[i]=ch[i];
                  audioCtx.close();
                  const durSecs=Math.round(audioBuf.duration);
                  const durStr=Math.floor(durSecs/60)+"m "+String(durSecs%60).padStart(2,"0")+"s";
                  setTxProgress("Transcribing "+durStr+" of audio...");
                  const result=await window._txPipeline(float32,{chunk_length_s:30,stride_length_s:5,return_timestamps:true,no_repeat_ngram_size:3});
                  let formatted="";
                  if(result.chunks&&result.chunks.length){
                    let prevText="";
                    result.chunks.forEach(c=>{
                      const txt=c.text.trim();
                      if(!txt)return;
                      // Skip repeated chunks
                      if(txt===prevText)return;
                      // Skip chunks that are just the same phrase repeated
                      const words=txt.split(/\s+/);
                      if(words.length>6){const half=words.slice(0,Math.floor(words.length/2)).join(" ");const rest=words.slice(Math.floor(words.length/2)).join(" ");if(half===rest)return;}
                      prevText=txt;
                      const ts0=c.timestamp[0]||0;const mins=Math.floor(ts0/60);const secs=Math.floor(ts0%60);const tsStr=String(mins).padStart(2,"0")+":"+String(secs).padStart(2,"0");
                      formatted+="["+tsStr+"] "+txt+"\n\n";
                    });
                  }
                  else{formatted=result.text||"No transcription returned.";}
                  setTxResult(formatted);setTxStatus("done");setTxProgress("");
                  setTxHistory(prev=>[{id:Date.now().toString(36),fileName:txFileName,text:formatted,duration:durStr,date:new Date().toISOString(),by:currentUser?.displayName},...prev]);
                  addAudit("Audio Transcribed",txFileName+" ("+durStr+")");
                  toast2("Transcription complete!");
                }catch(err){setTxResult("Error: "+err.message);setTxStatus("error");setTxProgress("");toast2("Transcription failed.");}

            </div>}

          {/* History */}

            <div style={{padding:"12px 16px",borderBottom:"1px solid #f3f4f6",display:"flex",alignItems:"center"}}><span style={{fontWeight:700,fontSize:13,color:"#111827",flex:1}}>Recent Transcriptions</span><button onClick={()=>{if(window.confirm("Clear all transcription history?"))setTxHistory([]);}} style={{fontSize:10,color:"#dc2626",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:4,padding:"2px 8px",cursor:"pointer"}}>Clear All</button></div>
            {txHistory.map(h=><div key={h.id} style={{borderBottom:"1px solid #f3f4f6"}}>

                <span style={{fontSize:12}}>🎙️</span>

                <span style={{fontSize:10,color:"#9ca3af"}}>{new Date(h.date).toLocaleDateString("en-NZ",{day:"2-digit",month:"short"})}</span>
                <span style={{fontSize:10,color:"#9ca3af"}}>{h.by}</span>
                <span style={{fontSize:11,color:"#9ca3af"}}>▼</span>

              <div id={"tx_hist_"+h.id} style={{display:"none",padding:"0 16px 12px"}}>
                <pre style={{fontSize:11,color:"#374151",lineHeight:1.7,whiteSpace:"pre-wrap",fontFamily:"inherit",margin:0,background:"#f9fafb",borderRadius:8,padding:"10px 12px"}}>{h.text}</pre>
                <div style={{marginTop:6}}><button onClick={()=>{copy(h.text);toast2("Copied!");}} style={{fontSize:10,color:"#0d9488",background:"#ecfdf5",border:"1px solid #a7f3d0",borderRadius:4,padding:"3px 10px",cursor:"pointer",fontWeight:600}}>Copy Transcript</button></div>
              </div>
            </div>)}
          </div>}
        </div>}

        {tab==="daily config"&&isAdmin&&<div style={{maxWidth:900}}>
          <div style={{fontSize:18,fontWeight:700,color:"#111827",marginBottom:4}}>Daily Config</div>
          <div style={{fontSize:13,color:"#9ca3af",marginBottom:20}}>Add, remove, or reorder fields for each team's daily report. Changes apply to both the leader form and admin view.</div>
          {(()=>{
            const cfg=dailyConfig||DEFAULT_DAILY_CONFIG;
            const teams=Object.keys(cfg).filter(tn=>tNames.includes(tn));

              const tgtVal=reportTeamModal.morning?.fields["_tgt_"+f.k]||"—";
              const evF=reportTeamModal.cfg.evening?.find(ef=>ef.k===f.k);
              const pmVal=evF&&reportTeamModal.evening?reportTeamModal.evening.fields[f.k]||"—":null;
              const pmNum=parseFloat(pmVal);const tgtNum2=parseFloat(tgtVal);
              const hit=pmVal!==null&&!isNaN(pmNum)&&!isNaN(tgtNum2)&&pmNum<=tgtNum2;
              const checked=!!reportTeamChecks[f.k];
              return<label key={f.k} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,border:"1px solid "+(checked?"#0d9488":"#e5e7eb"),background:checked?"#ecfdf5":"#fff",cursor:"pointer"}}>
                <input type="checkbox" checked={checked} onChange={()=>setReportTeamChecks(prev=>({...prev,[f.k]:!prev[f.k]}))} style={{width:16,height:16,accentColor:"#0d9488"}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:600,color:"#111827"}}>{f.l}</div>
                </div>
                <div style={{display:"flex",gap:12,fontSize:12}}>
                  <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#059669",fontWeight:600}}>AM</div><div style={{fontWeight:700,color:"#111827"}}>{amVal}</div></div>
                  <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#7c3aed",fontWeight:600}}>Target</div><div style={{fontWeight:700,color:"#7c3aed"}}>{tgtVal}</div></div>
                  {pmVal!==null&&<div style={{textAlign:"center"}}><div style={{fontSize:9,color:hit?"#059669":"#dc2626",fontWeight:600}}>PM</div><div style={{fontWeight:700,color:hit?"#059669":"#dc2626"}}>{pmVal}{hit?" ✓":" ✗"}</div></div>}
                </div>
              </label>;
            })}
          </div>
          {reportTeamModal.morning?.fields._plan&&<div style={{marginTop:12,padding:"8px 12px",background:"#fffbeb",borderRadius:8,fontSize:12}}><span style={{fontWeight:700,color:"#92400e"}}>Plan: </span>{reportTeamModal.morning.fields._plan}</div>}
          {reportTeamModal.evening?.fields._summary&&<div style={{marginTop:8,padding:"8px 12px",background:"#f5f3ff",borderRadius:8,fontSize:12}}><span style={{fontWeight:700,color:"#7c3aed"}}>End of Day Summary: </span>{reportTeamModal.evening.fields._summary}</div>}
        </div>
        <div style={{background:"#f9fafb",borderRadius:8,padding:"12px 14px",fontSize:11,color:"#6b7280"}}>Preview will be copied as a formatted table ready for Microsoft Teams.</div>
      </Modal>}
      {showProfile&&<div onClick={()=>setShowProfile(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",zIndex:199}}/>}
      {versionEditOpen&&<Modal title="Push Version Update" onClose={()=>setVersionEditOpen(false)}
        footer={<><button onClick={()=>setVersionEditOpen(false)} style={S.out}>Cancel</button><button onClick={async()=>{
          if(!versionEditVal.trim())return toast2("Enter a version number.");
          try{
            await sbSave("bc_store","app_version",versionEditVal.trim());
            addAudit("Version Published","v"+versionEditVal.trim()+" pushed to all users");
            toast2("Version v"+versionEditVal.trim()+" published! All other users will be forced to update.");
            setVersionEditOpen(false);
          }catch(e){toast2("Failed: "+e.message);}
        }} style={{...S.p1,background:"#dc2626"}}>Force Update All Users</button></>}>
        <div style={{textAlign:"center",padding:"10px 0 20px"}}>
          <div style={{fontSize:48,marginBottom:12}}>🚀</div>
          <div style={{fontSize:14,color:"#374151",marginBottom:20}}>This will force every other user to refresh their browser and load the latest version. Only do this after you've pushed new code to GitHub.</div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:600,color:"#4b5563",marginBottom:6}}>New Version Number</div>
            <input value={versionEditVal} onChange={e=>setVersionEditVal(e.target.value)} placeholder="e.g. 1.0.7" style={{...S.inp,textAlign:"center",fontSize:18,fontWeight:800,maxWidth:200,margin:"0 auto"}}/>
          </div>
          <div style={{fontSize:12,color:"#9ca3af"}}>{"Current version in code: v"+APP_VERSION}</div>
          <div style={{marginTop:16,padding:"10px 16px",background:"#fef2f2",borderRadius:8,border:"1px solid #fecaca",fontSize:12,color:"#dc2626",fontWeight:500}}>⚠️ All users currently online will see a full-screen update wall and must refresh to continue.</div>
        </div>
      </Modal>}
      </div>{/* end main content area */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(ErrorBoundary,null,React.createElement(App)));
</script>
</body>
</html>
